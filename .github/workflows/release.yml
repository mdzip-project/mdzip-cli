name: release-binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            ext: tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            ext: tar.gz
          - os: macos-latest
            rid: osx-x64
            ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            ext: tar.gz
          - os: windows-latest
            rid: win-x64
            ext: zip
          - os: windows-latest
            rid: win-arm64
            ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          source-url: https://nuget.pkg.github.com/kylemwhite/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "version=0.0.0-dev.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish self-contained binary
        run: >
          dotnet publish src/mdz.Cli/mdz.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:Version=${{ steps.tag.outputs.version }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o out/${{ matrix.rid }}

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          if [ -f "out/${{ matrix.rid }}/mdz.Cli" ]; then
            mv "out/${{ matrix.rid }}/mdz.Cli" "out/${{ matrix.rid }}/mdz"
          fi
          mkdir -p dist
          tar -czf "dist/mdz-${{ steps.tag.outputs.tag }}-${{ matrix.rid }}.tar.gz" -C "out/${{ matrix.rid }}" .

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          if (Test-Path "out/${{ matrix.rid }}/mdz.Cli.exe") {
            Rename-Item -Path "out/${{ matrix.rid }}/mdz.Cli.exe" -NewName "mdz.exe"
          }
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Compress-Archive -Path "out/${{ matrix.rid }}/*" -DestinationPath "dist/mdz-${{ steps.tag.outputs.tag }}-${{ matrix.rid }}.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v5
        with:
          name: package-${{ matrix.rid }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: package-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
